services:
  medusa-postgres:
    image: postgres:16-alpine
    container_name: elanorra-medusa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    ports:
      - "5433:5432"
    volumes:
      - medusa-postgres-data:/var/lib/postgresql/data

  medusa-redis:
    image: redis:7-alpine
    container_name: elanorra-medusa-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  medusa-postgres-data:
